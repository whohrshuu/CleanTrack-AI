version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: cleantrack-db
    environment:
      POSTGRES_DB: cleantrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: cleantrack-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cleantrack
      JWT_SECRET: cleantrack-dev-secret-key-change-in-production-min-32-chars
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: cleantrack-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
