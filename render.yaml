# Render.com Infrastructure-as-Code
# Deploy with: render blueprint apply

services:
  # Spring Boot Backend API
  - type: web
    name: cleantrack-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: cleantrack-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cleantrack-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: cleantrack-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: cleantrack-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cleantrack-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://cleantrack-ai.onrender.com
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
    healthCheckPath: /api/public/stats

  # React Frontend
  - type: web
    name: cleantrack-ai
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://cleantrack-api-1dmj.onrender.com/api

databases:
  - name: cleantrack-db
    plan: free
    databaseName: cleantrack
    postgresMajorVersion: "16"
